from: markdown+superscript+subscript+implicit_figures
to: pdf
pdf-engine: xelatex
filters:
  - pandoc-crossref
  - citeproc
include-in-header: preamble.tex
# Search for figures both in this directory and in the parent text/ directory
# (so `figures/...` paths in markdown resolve to ../figures/...).
resource-path:
  - .
  - ..
